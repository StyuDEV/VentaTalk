<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' data:; worker-src 'self' blob: data:" />
    <title>VentaTalk</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
      html, body {
        width: 100%; height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      }

      /* ── Conteneur ancré en bas, animé À L'INTÉRIEUR de la fenêtre (la fenêtre ne bouge pas) ── */
      #pill {
        position: absolute;
        left: 50%; bottom: 20px;
        transform: translateX(-50%) translateY(82px) scale(0.86);
        opacity: 0;
        display: flex; flex-direction: column; align-items: center; gap: 9px;
        transition:
          transform 500ms cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 240ms ease;
        will-change: transform, opacity;
      }
      #pill.show { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
      #pill:not(.show) { transition: transform 240ms cubic-bezier(0.4, 0, 1, 1), opacity 200ms ease; }

      /* ── Barre fine (minimaliste), coins façon logo ── */
      #card {
        position: relative;
        width: 150px; height: 40px; border-radius: 14px;
        background: linear-gradient(180deg, #20233a 0%, #0a0b14 100%);
        border: 1px solid rgba(129, 140, 248, 0.18);
        box-shadow: 0 8px 26px rgba(0, 0, 0, 0.5);
        display: flex; align-items: center; justify-content: center;
        transition: box-shadow 0.25s ease, border-color 0.25s ease;
      }
      /* halo radial derrière les barres */
      #card::before {
        content: ""; position: absolute; inset: 0; border-radius: inherit; z-index: 0;
        background: radial-gradient(ellipse 75% 150% at 50% 50%, rgba(99, 102, 241, 0.18), transparent 72%);
      }
      #pill.recording #card {
        border-color: rgba(129, 140, 248, 0.55);
        animation: glow 1.7s ease-in-out infinite;
      }
      #pill.processing #card { border-color: rgba(34, 211, 238, 0.5); box-shadow: 0 8px 26px rgba(0,0,0,0.5), 0 0 20px rgba(34,211,238,0.45); }
      #pill.error #card { border-color: rgba(239, 68, 68, 0.6); box-shadow: 0 8px 26px rgba(0,0,0,0.5), 0 0 20px rgba(239,68,68,0.48); }
      @keyframes glow {
        0%, 100% { box-shadow: 0 8px 26px rgba(0,0,0,0.5), 0 0 16px rgba(99,102,241,0.38); }
        50% { box-shadow: 0 8px 26px rgba(0,0,0,0.5), 0 0 30px rgba(99,102,241,0.66); }
      }

      /* ── Waveform (vivante) ── */
      #bars { position: relative; z-index: 1; display: flex; align-items: center; gap: 6px; height: 22px; }
      .bar {
        width: 4px; height: 100%; border-radius: 3px;
        background: linear-gradient(180deg, #a5b4fc 0%, #6366f1 100%);
        transform: scaleY(0.2); transform-origin: center;
        transition: transform 0.07s ease-out, background 0.25s ease;
      }
      #pill.processing .bar { background: linear-gradient(180deg, #67e8f9, #06b6d4); }
      #pill.idle .bar, #pill.error .bar { background: #475569; }
    </style>
  </head>
  <body>
    <div id="pill" class="idle">
      <div id="card">
        <div id="bars">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./overlay.ts"></script>
  </body>
</html>
