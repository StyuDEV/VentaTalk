<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- script-src SANS data: (un script data: est le vecteur XSS classique) ; le worklet audio
         (capture-processor.js) est un vrai fichier -> couvert par 'self'. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; worker-src 'self' blob:" />
    <title>VentaTalk</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
      html, body {
        width: 100%; height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      :root {
        /* easing Apple : settle doux + ressort discret (cf. Dynamic Island) */
        --ease-soft: cubic-bezier(.22, 1, .36, 1);
        --spring: linear(0,.009,.035,.078,.136,.207,.289,.378,.471,.564,.653,.737,.812,.877,.931,.974,1.006,1.027,1.04,1.045,1.044,1.039,1.031,1.022,1.013,1.006,1.001,.999,.999,1);
      }

      /* ── Conteneur ancré en bas, animé À L'INTÉRIEUR de la fenêtre (la fenêtre ne bouge jamais) ── */
      /* Entrée Apple : monte (14px) + léger scale (.92→1) + fondu, settle au ressort. Sortie plus rapide. */
      #pill {
        position: absolute;
        left: 50%; bottom: 20px;
        transform-origin: 50% 100%;
        transform: translateX(-50%) translateY(14px) scale(0.92);
        opacity: 0;
        display: flex; align-items: center; justify-content: center;
        transition: opacity 0.2s var(--ease-soft), transform 0.42s var(--spring);
        will-change: transform, opacity;
      }
      #pill.show { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
      #pill:not(.show) { transition: opacity 0.18s ease, transform 0.24s cubic-bezier(0.4, 0, 0.7, 0.2); }

      /* ── Dynamic Island : pill quasi OPAQUE noir, coins squircle, qui MORPHE en largeur ── */
      #card {
        position: relative;
        width: 150px; height: 40px;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        padding: 0 13px;
        border-radius: 20px;                 /* base = pill arrondi (Electron 37) */
        corner-shape: superellipse(2.2);     /* squircle Apple sur Chromium ≥139 (sinon ignoré) */
        background: rgba(12, 13, 20, 0.92);  /* presque noir, légèrement chaud (#0e0f1a) */
        border: 0.5px solid rgba(255, 255, 255, 0.08);
        box-shadow:
          inset 0 0.5px 0 rgba(255, 255, 255, 0.10),  /* arête supérieure « usinée » */
          0 1px 1px rgba(0, 0, 0, 0.5),
          0 12px 30px -8px rgba(0, 0, 0, 0.6);         /* ombre douce neutre (flotte) */
        transition: width 0.42s var(--spring), background 0.3s var(--ease-soft);
      }
      /* Morph de largeur selon l'état (signature Dynamic Island) */
      #pill.recording  #card { width: 128px; }
      #pill.processing #card { width: 110px; }
      #pill.error      #card { width: 152px; }
      #pill.idle       #card { width: 120px; }

      /* ── Dot d'état (la couleur ARRIVE, pas de halo — façon Apple) ── */
      #dot {
        width: 6px; height: 6px; border-radius: 50%; flex: 0 0 auto;
        background: rgba(148, 163, 184, 0.5);
        transition: background 0.25s var(--ease-soft);
      }
      #pill.recording  #dot { background: #818cf8; }
      #pill.processing #dot { background: #a855f7; }
      #pill.error      #dot { background: #ef4444; }

      /* ── Waveform fine, calme, monochrome (la couleur ne vit que sur la voix) ── */
      #bars { display: flex; align-items: center; gap: 3px; height: 18px; }
      .bar {
        width: 2.5px; height: 100%; border-radius: 2px;
        background: #c7cdff;                 /* blanc à âme indigo (écoute) */
        transform: scaleY(0.12); transform-origin: center;
        transition: transform 0.08s ease-out, background 0.25s ease;
      }
      #pill.recording  .bar { background: #c7cdff; }  /* écoute : blanc-indigo */
      #pill.processing .bar { background: #a855f7; }  /* traitement : VIOLET */
      #pill.error      .bar { background: #ef4444; }  /* erreur : rouge */
      #pill.idle       .bar { background: rgba(148, 163, 184, 0.5); }

      /* ── Bannière d'erreur À L'ÉCRAN (même fenêtre overlay, sous le curseur) : pill façon Dynamic
         Island, un peu plus large, avec un point rouge + un texte court. Jaillit du bas comme la barre,
         tient ~2,3 s, puis redescend. Se dimensionne au contenu (absolu -> shrink-to-fit). */
      #toast {
        position: absolute;
        left: 50%; bottom: 20px;
        transform-origin: 50% 100%;
        transform: translateX(-50%) translateY(14px) scale(0.92);
        opacity: 0;
        display: flex; align-items: center; gap: 9px;
        max-width: 300px; height: 40px; padding: 0 15px;
        border-radius: 20px;
        background: rgba(12, 13, 20, 0.94);
        border: 0.5px solid rgba(255, 255, 255, 0.08);
        box-shadow:
          inset 0 0.5px 0 rgba(255, 255, 255, 0.10),
          0 1px 1px rgba(0, 0, 0, 0.5),
          0 12px 30px -8px rgba(0, 0, 0, 0.6);
        transition: opacity 0.2s var(--ease-soft), transform 0.42s var(--spring);
      }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
      #toast:not(.show) { transition: opacity 0.18s ease, transform 0.24s cubic-bezier(0.4, 0, 0.7, 0.2); }
      #toast .t-dot {
        width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto;
        background: #ef4444; box-shadow: 0 0 9px rgba(239, 68, 68, 0.65);
      }
      #toastMsg {
        color: #f4f5fb; font-size: 12.5px; font-weight: 500; letter-spacing: -0.01em;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
      }
    </style>
  </head>
  <body>
    <div id="pill" class="idle">
      <div id="card">
        <span id="dot"></span>
        <div id="bars">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
      </div>
    </div>
    <div id="toast"><span class="t-dot"></span><span id="toastMsg"></span></div>
    <script type="module" src="./overlay.ts"></script>
  </body>
</html>
