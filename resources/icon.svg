<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#20233a"/>
      <stop offset="1" stop-color="#0a0b14"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.52" r="0.55">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- squircle -->
  <rect x="64" y="64" width="896" height="896" rx="232" fill="url(#bg)"/>
  <!-- liseré teal subtil (pour ne pas disparaître sur fond sombre) -->
  <rect x="65.5" y="65.5" width="893" height="893" rx="230.5" fill="none"
        stroke="#818cf8" stroke-opacity="0.18" stroke-width="3"/>

  <!-- halo teal derrière les barres -->
  <ellipse cx="512" cy="520" rx="372" ry="312" fill="url(#glow)"/>

  <!-- barres de la waveform (la pilule d'écoute) -->
  <g fill="url(#bar)">
    <rect x="160" y="420" width="96" height="184" rx="48"/>
    <rect x="312" y="356" width="96" height="312" rx="48"/>
    <rect x="464" y="282" width="96" height="460" rx="48"/>
    <rect x="616" y="356" width="96" height="312" rx="48"/>
    <rect x="768" y="420" width="96" height="184" rx="48"/>
  </g>
</svg>
